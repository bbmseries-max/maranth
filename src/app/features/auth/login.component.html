<div class="login-viewport">
  
  <div class="login-card">
    
    <div class="brand-section">
      <div class="logo-circle">🍊</div>
      <h1 class="brand-title">MARANTH</h1>
      <p class="brand-subtitle">Secure Terminal Access</p>
    </div>
    
    <form class="login-form" (ngSubmit)="onLogin()">
      
      <div class="app-form-group">
        <label class="app-form-label">Cashier ID / Username</label>
        <div class="input-with-icon">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            class="app-input custom-login-input" 
            [ngModel]="username()" 
            (ngModelChange)="username.set($event)" 
            name="username" 
            placeholder="e.g. admin" 
            autocomplete="off"
            autofocus
          >
        </div>
      </div>
      
      <div class="app-form-group" style="margin-top: 16px;">
        <label class="app-form-label">Authorization PIN</label>
        <div class="input-with-icon">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            class="app-input custom-login-input" 
            [ngModel]="password()" 
            (ngModelChange)="password.set($event)" 
            name="password" 
            placeholder="••••"
          >
        </div>
      </div>
      
      <button type="submit" class="app-btn app-btn-primary login-btn">
        Unlock Register ➔
      </button>

      <!-- ⭐ NEW: Link to Register Screen -->
      <div style="margin-top: 20px; text-align: center;">
        <a routerLink="/register" style="color: #3b82f6; font-size: 14px; font-weight: 600; text-decoration: none;">
          Need a Cashier ID? Register here.
        </a>
      </div>

    </form>

    <div class="footer-note">
      POS System v2.0 • Authorized Personnel Only
    </div>

  </div>

  <!-- Note: We must include the global modal here so Login errors pop up properly -->
  @if (salesService.activeModal(); as modal) {
    <div class="pos-modal-overlay is-active" style="z-index: 99999;">
      <div class="pos-modal-window">
        <div class="pos-modal-header" [class.warning-header]="modal.type === 'warning'">
          {{ modal.title }}
        </div>
        <div class="pos-modal-body">
          <p style="margin: 0;">{{ modal.message }}</p>
        </div>
        <div class="pos-modal-footer">
          <button class="pos-modal-btn pos-modal-btn-danger" (click)="salesService.activeModal.set(null)">
            Dismiss
          </button>
        </div>
      </div>
    </div>
  }
</div>
