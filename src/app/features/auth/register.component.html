<div class="login-viewport">
  
  <div class="login-card" style="max-width: 480px;">
    
    <div class="brand-section">
      <div class="logo-circle" style="background: #e0f2fe; color: #0284c7;">➕</div>
      <h1 class="brand-title">New Cashier</h1>
      <p class="brand-subtitle">Register Terminal Access</p>
    </div>
    
    <form class="login-form" (ngSubmit)="onRegister()">
      
      <div class="app-form-group">
        <label class="app-form-label">Create a Cashier ID / Username</label>
        <div class="input-with-icon">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            class="app-input custom-login-input" 
            [ngModel]="username()" 
            (ngModelChange)="username.set($event)" 
            name="username" 
            placeholder="e.g. maria_cashier" 
            autocomplete="off"
            autofocus
          >
        </div>
      </div>

      <!-- ⭐ Renamed the ngModel to bust the compiler cache -->
      <div class="app-form-group" style="margin-top: 16px;">
        <label class="app-form-label">Assign Privilege Role</label>
        <div class="input-with-icon">
          <span class="input-icon">🛡️</span>
          <select 
            class="app-input custom-login-input" 
            [(ngModel)]="assignedRole" 
            name="role"
          >
            <option value="cashier">Standard Cashier (Register & Stock Only)</option>
            <option value="admin">Store Admin (Full Access)</option>
          </select>
        </div>
      </div>
      
   <div style="display: flex; gap: 16px; margin-top: 16px;">
            <div class="app-form-group" style="flex: 1;">
              <label class="app-form-label">Create 4-Digit PIN</label>
              <div class="input-with-icon">
                <span class="input-icon">🔒</span>
                <input type="password" class="app-input custom-login-input" [ngModel]="pin()" (ngModelChange)="pin.set($event)" name="pin" placeholder="••••">
              </div>
            </div>

            <div class="app-form-group" style="flex: 1;">
              <label class="app-form-label">Confirm PIN</label>
              <div class="input-with-icon">
                <span class="input-icon">🔒</span>
                <input type="password" class="app-input custom-login-input" [ngModel]="confirmPin()" (ngModelChange)="confirmPin.set($event)" name="confirmPin" placeholder="••••">
              </div>
            </div>
          </div>

          <button type="submit" class="app-btn app-btn-primary login-btn" style="background: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25); margin-top: 24px;">
            ✅ Register & Send for Approval
          </button>

          <div style="margin-top: 20px; text-align: center;">
            <a routerLink="/login" style="color: #64748b; font-size: 14px; font-weight: 600; text-decoration: none;">
              
      
      <button type="submit" class="app-btn app-btn-primary login-btn" style="background: #10b981; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);">
        ✅ Register & Login
      </button>

      <div style="margin-top: 20px; text-align: center;">
        <a routerLink="/login" style="color: #64748b; font-size: 14px; font-weight: 600; text-decoration: none;">
          ⬅️ Back to Login Screen
        </a>
      </div>

    </form>

  </div>

  <!-- Global Modal Layer for Error popups -->
  @if (salesService.activeModal(); as modal) {
    <div class="pos-modal-overlay is-active" style="z-index: 99999;">
      <div class="pos-modal-window">
        <div class="pos-modal-header" [class.warning-header]="modal.type === 'warning'">
          {{ modal.title }}
        </div>
        <div class="pos-modal-body">
          <p style="margin: 0;">{{ modal.message }}</p>
        </div>
        <div class="pos-modal-footer">
          <button class="pos-modal-btn pos-modal-btn-danger" (click)="salesService.closeModal()">
            Dismiss
          </button>
        </div>
      </div>
    </div>
  }
</div>
