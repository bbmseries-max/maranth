<div class="basket-summary-footer">
    
    <div class="total-row-breakdown" style="display: flex; justify-content: space-between; font-size: 13px; color: #6c757d; margin-bottom: 4px;">
      <span>Subtotal (Net):</span>
      <span>{{ salesService.netSubtotal() | currency:'EUR':'symbol':'1.2-2' }}</span>
    </div>

    <div class="total-row-breakdown" style="display: flex; justify-content: space-between; font-size: 13px; color: #6c757d; margin-bottom: 8px;">
      <span>VAT (24%):</span>
      <span>{{ salesService.taxAmount() | currency:'EUR':'symbol':'1.2-2' }}</span>
    </div>

    <div class="total-row" style="border-top: 1px dashed #dee2e6; padding-top: 8px; margin-bottom: 12px;">
      <span class="total-label">Grand Total:</span>
      <span class="total-price-tag">{{ salesService.grandTotal() | currency:'EUR':'symbol':'1.2-2' }}</span>
    </div>

    <button type="button" class="btn-checkout-action" [disabled]="basketItems().length === 0" (click)="processCheckout()">
      💶 Complete Sale (Pay)
    </button>
  </div>
